<!doctype html>
<html lang="en">

<head>
  <!-- Google Tag Manager (Delayed) -->
  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        (function (w, d, s, l, i) {
          w[l] = w[l] || []; w[l].push({
            'gtm.start':
              new Date().getTime(), event: 'gtm.js'
          }); var f = d.getElementsByTagName(s)[0],
            j = d.createElement(s), dl = l != 'dataLayer' ? '&l=' + l : ''; j.async = true; j.src =
              'https://www.googletagmanager.com/gtm.js?id=' + i + dl; f.parentNode.insertBefore(j, f);
        })(window, document, 'script', 'dataLayer', 'GTM-PHMLX7W5');
      }, 1000);
    });
  </script>
  <!-- End Google Tag Manager -->

  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://res.cloudinary.com">
  <link rel="dns-prefetch" href="https://res.cloudinary.com">

  <link rel="preconnect" href="https://hbn-24.vercel.app" crossorigin>
  <script>
    // Preload the main news API to drastically improve LCP only on the homepage
    if (window.location.pathname === '/') {
      var apiUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname.startsWith('192.168.') ? '' : 'https://hbn-24.vercel.app';
      var link = document.createElement('link');
      link.rel = 'preload';
      link.href = apiUrl + '/api/news/home';
      link.as = 'fetch';
      link.crossOrigin = 'anonymous';
      link.fetchPriority = 'high';
      document.head.appendChild(link);
    }
  </script>

  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700;900&family=Yatra+One&display=swap" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700;900&family=Yatra+One&display=swap"
    media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" />
  </noscript>

  <title>HBN24 News</title>

  <style>
    /* Hide the Google Translate top banner */
    .skiptranslate>iframe.skiptranslate {
      display: none !important;
    }

    body {
      top: 0px !important;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* Customize the widget look */
    .goog-te-gadget {
      font-size: 0px !important;
      color: transparent !important;
      display: flex;
      align-items: center;
    }

    .goog-te-gadget img {
      display: none !important;
    }

    #google_translate_element {
      display: none !important;
    }

    /* Inline Preloader for Instant FCP */
    #root-preloader {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1rem;
      box-sizing: border-box;
    }

    .skel-block {
      background-color: #e5e7eb;
      border-radius: 16px;
      width: 100%;
      aspect-ratio: 16/9;
      animation: skel-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes skel-pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .5;
      }
    }
  </style>

</head>

<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PHMLX7W5" height="0" width="0"
      style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <div id="root">
    <div id="root-preloader">
      <div style="display:flex; justify-content:space-between; margin-bottom:2rem; align-items:center;">
        <div style="width:120px; height:40px; background:#e5e7eb; border-radius:8px;"></div>
        <div style="width:40px; height:40px; background:#e5e7eb; border-radius:50%;"></div>
      </div>
      <div class="skel-block" style="margin-bottom:2rem;"></div>
      <div style="display:flex; gap:1rem; flex-wrap:wrap;">
        <div style="width:140px; height:90px; background:#e5e7eb; border-radius:4px;"></div>
        <div style="flex:1;">
          <div style="height:1rem; background:#e5e7eb; margin-bottom:0.5rem; width:100%;"></div>
          <div style="height:1rem; background:#e5e7eb; width:80%;"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
